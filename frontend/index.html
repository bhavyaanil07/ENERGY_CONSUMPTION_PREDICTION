<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Consumption Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart Energy Consumption Predictor</h1>
        <p class="subtitle">
            Predict appliance energy consumption using temperature, humidity, date, and time.
        </p>

        <div class="card">
            <h2>Enter Details</h2>

            <form id="predictionForm">
                <label for="temperature">Outdoor Temperature</label>
                <input type="number" id="temperature" step="0.1" placeholder="Example: 28" required>

                <label for="humidity">Outdoor Humidity</label>
                <input type="number" id="humidity" step="0.1" placeholder="Example: 65" required>

                <label for="date">Date</label>
                <input type="date" id="date" required>

                <label for="hour">Hour of Day</label>
                <input type="number" id="hour" min="0" max="23" placeholder="Example: 18" required>

                <button type="submit">Predict Energy Consumption</button>
            </form>
        </div>

        <div class="result-card" id="resultCard">
            <h2>Prediction Result</h2>
            <p id="predictionText"></p>
            <p id="usageLevel"></p>
            <p id="suggestion"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
